services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # 👇 FIX: Define two distinct listeners mapping to PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      # 👇 FIX: Open two ports (29092 for Docker, 9092 for Host)
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      # 👇 FIX: Advertise the correct address based on how the client connected
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      # 👇 FIX: Tell Kafka to use the INTERNAL listener for its own background chatter
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
        - kafka
    ports:
      - "8090:8080" # Access via localhost:8090
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kafka
      # Point the UI to the internal Docker network address
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTER_0_ZOOKEEPER: zookeeper:2181

